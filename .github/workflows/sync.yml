name: upstream-sync
on:
  schedule:
    - cron: '0 5 * * 1' # weekly, Monday 05:00 UTC (before link-health at 06:00)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Pull new tools from upstream
        run: npm run data:sync
      - name: Tag new entries
        run: npm run data:enrich
      - name: Validate
        run: npm run data:validate
      - name: Open PR with new tools
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync new tools from upstream'
          title: 'chore: upstream sync — new tools'
          body: |
            Automated add-only sync from the upstream cheat-sheet.
            New entries are `status: unchecked` — the link-health job will resolve them.
            Review for relevance/safety before merging.
          branch: bot/upstream-sync
          delete-branch: true
